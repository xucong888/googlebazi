server {
    listen 80;
    server_name xuanhuchengguang.online www.xuanhuchengguang.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xuanhuchengguang.online www.xuanhuchengguang.online;

    ssl_certificate     /etc/letsencrypt/live/xuanhuchengguang.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xuanhuchengguang.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # HTML — never cache, always get latest
    location ~* \.html$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Static JS/CSS assets — long cache (content-hashed filenames)
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # DeepSeek streaming — disable buffering so chunks flow in real-time
    location /deepseek-api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
    }

    # All other requests → Express (API + SPA fallback)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
